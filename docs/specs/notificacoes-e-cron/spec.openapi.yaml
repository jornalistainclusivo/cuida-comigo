openapi: 3.1.0
info:
  title: Orquestração de Cuidado - Notificações
  version: 1.4.0
paths:
  /api/v1/care-groups/{group_id}/notifications:
    get:
      summary: Lista notificações de um grupo de cuidado
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Lista de Notificações
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'

  /api/v1/notifications/{id}/read:
    patch:
      summary: Marca notificação como lida
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

components:
  schemas:
    NotificationResponse:
      type: object
      required: [id, care_group_id, title, message, type, is_read, created_at]
      properties:
        id:
          type: string
          format: uuid
        care_group_id:
          type: string
          format: uuid
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [DOSE_REGISTERED, TASK_CREATED, TASK_COMPLETED, STOCK_ALERT, DOSE_ATRASADA]
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
